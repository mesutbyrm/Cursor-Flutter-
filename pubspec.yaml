name: canlifal_mobile
description: Professional Flutter mobile app for canlifal.com.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  go_router: ^17.2.3
  infinite_scroll_pagination: ^5.1.1
  intl: ^0.20.2
  livekit_client: ^2.3.1+hotfix.1
  shared_preferences: ^2.5.5
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
