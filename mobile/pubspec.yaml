name: canlifal_social
description: Canlifal — modern sosyal medya istemcisi (REST + JWT, Clean Architecture).
publish_to: 'none'

version: 1.0.132+134

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.2
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  go_router: ^15.1.2
  equatable: ^2.0.7
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  tencent_rtc_sdk: ^13.2.2
  permission_handler: ^12.0.1
  lottie: ^3.3.1
  rive: ^0.13.20
  audioplayers: ^6.4.0
  flutter_cache_manager: ^3.4.1
  flutter_animate: ^4.5.2
  livekit_client: ^2.4.1
  socket_io_client: ^3.1.2
  share_plus: ^12.0.2
  flutter_web_auth_2: ^4.1.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5
  flutter_local_notifications: ^19.0.0
  image_picker: ^1.1.2
  onesignal_flutter: ^5.5.4
  google_sign_in: ^6.3.0

dependency_overrides:
  tencent_rtc_sdk:
    path: packages/tencent_rtc_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^3.0.6
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/splash/
    - assets/brand/
    - assets/fortune/
    - assets/gifts/lottie/
    - assets/gifts/rive/
    - assets/gifts/svga/
    - assets/gifts/sounds/
