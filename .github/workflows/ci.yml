name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'api/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  mobile:
    name: Flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Dart analyze (fail only on errors)
        run: |
          set +e
          dart analyze lib
          ec=$?
          if [ "$ec" -eq 3 ]; then exit 1; fi
          if [ "$ec" -eq 2 ]; then
            echo "::warning::Analyzer reported warnings — treating as non-blocking"
          fi
          exit 0

  api:
    name: API TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
