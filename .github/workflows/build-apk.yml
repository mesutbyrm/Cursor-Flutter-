# APK derleme + GitHub Release (ubuntu + Flutter action, Android SDK dahil).
# Sabit indirme: releases/download/apk-latest/canlifal-mobile-release.apk
#
# Not: Artifact depolama kotası aşıldığında iş akışı başarısız olmasın diye
# APK doğrudan GitHub Release'e yüklenir; artifact adımı isteğe bağlıdır.

name: Build release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write
  actions: write

jobs:
  build-and-publish:
    name: Build and publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Eski workflow artifact'larını temizle
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ids=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.expired==false) | .id' 2>/dev/null | head -30)
          for id in $ids; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${id}" 2>/dev/null || true
          done

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Dependencies
        run: flutter pub get

      - name: Firebase google-services.json (secret)
        working-directory: ${{ github.workspace }}
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -eux
          if [ -n "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > mobile/android/app/google-services.json
            bash scripts/generate-firebase-options.sh
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 not set — skipping Firebase config"
          fi

      - name: Analyze
        run: |
          set +e
          dart analyze lib
          ec=$?
          if [ "$ec" -eq 3 ]; then exit 1; fi
          exit 0

      - name: Build release APK
        working-directory: mobile
        run: |
          set -eux
          DEFINES=""
          if [[ -f android/app/google-services.json ]]; then
            DEFINES=$(bash ../scripts/print-firebase-dart-defines.sh || true)
          fi
          # shellcheck disable=SC2086
          flutter build apk --release $DEFINES
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx3g

      - name: Stabil dağıtım dosya adı (repo kökü)
        working-directory: ${{ github.workspace }}
        run: |
          cp mobile/build/app/outputs/flutter-apk/app-release.apk \
            canlifal-mobile-release.apk
          ls -la canlifal-mobile-release.apk

      - name: Sürüm notları hazırla
        id: notes
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          VERSION=$(grep -E '^version:' mobile/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "# Canlifal APK ${VERSION}"
            echo ""
            echo "**İndir:** https://github.com/${{ github.repository }}/releases/download/apk-latest/canlifal-mobile-release.apk"
            echo ""
            echo "## Bu sürümde (CHANGELOG)"
            echo ""
            bash scripts/extract-changelog-head.sh
            echo ""
            echo "---"
            echo "Commit: \`${{ github.sha }}\` · Run: ${{ github.run_id }}"
          } > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: apk-latest sürekli sürüm (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Canlifal APK ${{ steps.notes.outputs.version }}
          body_path: /tmp/release_notes.md
          files: canlifal-mobile-release.apk
          make_latest: true
          overwrite_files: true

      - name: Sürüm etiketi (v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: canlifal-mobile-release.apk

      - name: Bildirim dosyası (docs/LATEST_APK_BUILD.md)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          mkdir -p docs
          {
            echo "# Son APK derlemesi"
            echo ""
            echo "| Alan | Değer |"
            echo "|------|--------|"
            echo "| Sürüm | \`${{ steps.notes.outputs.version }}\` |"
            echo "| Tarih (UTC) | $(date -u +"%Y-%m-%d %H:%M") |"
            echo "| Commit | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| İş akışı | [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| APK | [canlifal-mobile-release.apk](https://github.com/${{ github.repository }}/releases/download/apk-latest/canlifal-mobile-release.apk) |"
            echo ""
            echo "## Özellikler"
            echo ""
            bash scripts/extract-changelog-head.sh
            echo ""
            echo "_Bu dosya Build release APK iş akışı tarafından otomatik güncellenir._"
          } > docs/LATEST_APK_BUILD.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/LATEST_APK_BUILD.md
          git diff --staged --quiet || git commit -m "chore(docs): APK derleme bildirimi ${{ steps.notes.outputs.version }}"
          git pull --rebase origin main 2>/dev/null || git pull --no-rebase origin main -X ours || true
          git push origin main 2>/dev/null || true

      - name: Upload APK artifact (isteğe bağlı)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: canlifal-social-release-apk
          path: canlifal-mobile-release.apk
          retention-days: 1
          if-no-files-found: error
