# APK: main + mobile değişiklikleri → artifact; v* etiketi → GitHub Release.
# İndirme: APK_DOWNLOAD.md

name: Build release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Stabil dağıtım dosya adı (repo kökü)
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "${GITHUB_WORKSPACE}/canlifal-mobile-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: canlifal-social-release-apk
          path: canlifal-mobile-release.apk
          if-no-files-found: error

      - name: GitHub Release’a APK ekle (yalnızca sürüm etiketi)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: canlifal-mobile-release.apk
