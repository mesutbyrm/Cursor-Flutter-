# APK derleme (Flutter konteyner) + GitHub Release (ubuntu, gh CLI).
# Sabit indirme: releases/download/apk-latest/canlifal-mobile-release.apk
# Ayrıntı: APK_DOWNLOAD.md

name: Build release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Stabil dağıtım dosya adı (repo kökü)
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "${GITHUB_WORKSPACE}/canlifal-mobile-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: canlifal-social-release-apk
          path: canlifal-mobile-release.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: İndir APK
        uses: actions/download-artifact@v4
        with:
          name: canlifal-social-release-apk

      - name: apk-latest sürekli sürüm (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          ls -la
          test -f canlifal-mobile-release.apk
          gh release delete apk-latest -y --cleanup-tag --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create apk-latest canlifal-mobile-release.apk \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Latest test APK" \
            --notes "Otomatik derleme (main). İş akışı: ${{ github.run_id }}, commit: \`${{ github.sha }}\`."

      - name: Sürüm etiketi (v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: canlifal-mobile-release.apk
