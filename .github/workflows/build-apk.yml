# APK derleme (Flutter konteyner) + GitHub Release (ubuntu, gh CLI).
# Sabit indirme: releases/download/apk-latest/canlifal-mobile-release.apk
# Ayrıntı: APK_DOWNLOAD.md

name: Build release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable
    defaults:
      run:
        working-directory: mobile

    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx2g

      - name: Stabil dağıtım dosya adı (repo kökü)
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "${GITHUB_WORKSPACE}/canlifal-mobile-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: canlifal-social-release-apk
          path: canlifal-mobile-release.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: İndir APK
        uses: actions/download-artifact@v4
        with:
          name: canlifal-social-release-apk

      - name: Sürüm notları hazırla
        id: notes
        run: |
          set -eux
          VERSION=$(grep -E '^version:' mobile/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "# Canlifal APK ${VERSION}"
            echo ""
            echo "**İndir:** https://github.com/${{ github.repository }}/releases/download/apk-latest/canlifal-mobile-release.apk"
            echo ""
            echo "## Bu sürümde (CHANGELOG)"
            echo ""
            bash scripts/extract-changelog-head.sh
            echo ""
            echo "---"
            echo "Commit: \`${{ github.sha }}\` · Run: ${{ github.run_id }}"
          } > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: apk-latest sürekli sürüm (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          ls -la
          test -f canlifal-mobile-release.apk
          gh release delete apk-latest -y --cleanup-tag --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create apk-latest canlifal-mobile-release.apk \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Canlifal APK ${{ steps.notes.outputs.version }}" \
            --notes-file /tmp/release_notes.md

      - name: Bildirim dosyası (docs/LATEST_APK_BUILD.md)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          mkdir -p docs
          {
            echo "# Son APK derlemesi"
            echo ""
            echo "| Alan | Değer |"
            echo "|------|--------|"
            echo "| Sürüm | \`${{ steps.notes.outputs.version }}\` |"
            echo "| Tarih (UTC) | $(date -u +"%Y-%m-%d %H:%M") |"
            echo "| Commit | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| İş akışı | [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| APK | [canlifal-mobile-release.apk](https://github.com/${{ github.repository }}/releases/download/apk-latest/canlifal-mobile-release.apk) |"
            echo ""
            echo "## Özellikler"
            echo ""
            bash scripts/extract-changelog-head.sh
            echo ""
            echo "_Bu dosya Build release APK iş akışı tarafından otomatik güncellenir._"
          } > docs/LATEST_APK_BUILD.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/LATEST_APK_BUILD.md
          git diff --staged --quiet || git commit -m "chore(docs): APK derleme bildirimi ${{ steps.notes.outputs.version }}"
          git pull --rebase origin main
          git push origin main

      - name: Sürüm etiketi (v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: canlifal-mobile-release.apk
